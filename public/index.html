<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marathon Training Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            condensed: ['Barlow Condensed', 'sans-serif'],
            body: ['Barlow', 'sans-serif'],
          },
          colors: {
            brand: {
              bg: '#020617',
              card: '#0F172A',
              card2: '#1E293B',
              orange: '#F97316',
              orangeDim: '#EA580C',
              blue: '#3B82F6',
              text: '#F8FAFC',
              muted: '#94A3B8',
              border: '#1E293B',
            }
          },
          animation: {
            'fade-up': 'fadeUp 0.4s ease forwards',
            'pulse-orange': 'pulseOrange 2s infinite',
            'shimmer': 'shimmer 1.5s infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseOrange: {
              '0%, 100%': { boxShadow: '0 0 0 0 rgba(249,115,22,0.4)' },
              '50%': { boxShadow: '0 0 0 8px rgba(249,115,22,0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            }
          }
        }
      }
    };
  </script>
  <style>
    * { font-family: 'Barlow', sans-serif; }
    h1, h2, h3, .condensed { font-family: 'Barlow Condensed', sans-serif; }

    body { background-color: #020617; color: #F8FAFC; }

    .card-glow:hover {
      box-shadow: 0 0 0 1px rgba(249,115,22,0.3), 0 8px 32px rgba(249,115,22,0.1);
    }

    .stat-bar {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      border: 1px solid rgba(249,115,22,0.15);
    }

    .run-card {
      background: linear-gradient(135deg, #0F172A 0%, #1a2030 100%);
      border: 1px solid #1E293B;
      transition: all 0.25s ease;
    }
    .run-card:hover {
      border-color: rgba(249,115,22,0.4);
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #F97316, #EA580C);
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #EA580C, #C2410C);
      box-shadow: 0 4px 20px rgba(249,115,22,0.35);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .input-field {
      background: #0F172A;
      border: 1px solid #1E293B;
      color: #F8FAFC;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #F97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
    }
    .input-field::placeholder { color: #475569; }

    .skeleton {
      background: linear-gradient(90deg, #0F172A 25%, #1E293B 50%, #0F172A 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    .pace-badge {
      background: rgba(249,115,22,0.12);
      border: 1px solid rgba(249,115,22,0.25);
      color: #F97316;
    }
    .time-badge {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      color: #60A5FA;
    }

    .delete-btn {
      color: #475569;
      transition: all 0.2s;
    }
    .delete-btn:hover { color: #EF4444; }

    .progress-bar {
      background: linear-gradient(90deg, #3B82F6, #F97316);
      height: 3px;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Top accent line -->
  <div class="h-1 w-full" style="background: linear-gradient(90deg, #3B82F6, #F97316, #3B82F6);"></div>

  <div class="max-w-5xl mx-auto px-4 py-10">

    <!-- Header -->
    <header class="mb-10 animate-fade-up">
      <div class="flex items-start justify-between">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <!-- Running icon SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="#F97316" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            <span class="condensed text-brand-orange text-sm font-semibold tracking-widest uppercase">Training Log</span>
          </div>
          <h1 class="condensed text-5xl font-700 text-brand-text leading-none tracking-tight">
            MARATHON<br/>
            <span class="text-brand-orange">TRACKER</span>
          </h1>
        </div>
        <div class="text-right">
          <p id="total-km" class="condensed text-4xl font-700 text-brand-orange">—</p>
          <p class="text-brand-muted text-sm">Gesamt km</p>
        </div>
      </div>
    </header>

    <!-- Stats Row -->
    <div class="grid grid-cols-3 gap-3 mb-10" id="stats-row">
      <!-- Skeleton while loading -->
      <div class="skeleton h-20"></div>
      <div class="skeleton h-20"></div>
      <div class="skeleton h-20"></div>
    </div>

    <!-- Section Title -->
    <div class="flex items-center justify-between mb-4">
      <h2 class="condensed text-2xl font-600 text-brand-text tracking-wide uppercase">Läufe</h2>
      <span id="run-count" class="text-brand-muted text-sm"></span>
    </div>

    <!-- Runs Grid -->
    <div id="runs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12">
      <!-- Skeleton cards -->
      <div class="skeleton h-48"></div>
      <div class="skeleton h-48"></div>
      <div class="skeleton h-48"></div>
    </div>

    <!-- Add Run Form -->
    <div class="stat-bar rounded-2xl p-8">
      <h2 class="condensed text-2xl font-600 text-brand-text tracking-wide uppercase mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-orange" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        Neuen Lauf eintragen
      </h2>

      <form id="run-form" class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <div>
          <label class="block text-xs font-600 text-brand-muted uppercase tracking-widest mb-2" for="date">Datum</label>
          <input type="date" id="date"
            class="input-field w-full rounded-lg px-4 py-3 text-sm"
            data-error="Bitte ein Datum eingeben." required />
          <p class="hidden mt-1 text-xs text-red-400 error-msg"></p>
        </div>

        <div>
          <label class="block text-xs font-600 text-brand-muted uppercase tracking-widest mb-2" for="distanceKm">Distanz (km)</label>
          <input type="number" id="distanceKm" placeholder="z.B. 10.5" step="0.1" min="0.1"
            class="input-field w-full rounded-lg px-4 py-3 text-sm"
            data-error="Bitte eine Distanz größer 0 eingeben." required />
          <p class="hidden mt-1 text-xs text-red-400 error-msg"></p>
        </div>

        <div>
          <label class="block text-xs font-600 text-brand-muted uppercase tracking-widest mb-2" for="durationMin">Dauer (Minuten)</label>
          <input type="number" id="durationMin" placeholder="z.B. 60" min="1"
            class="input-field w-full rounded-lg px-4 py-3 text-sm"
            data-error="Bitte eine Dauer eingeben." required />
          <p class="hidden mt-1 text-xs text-red-400 error-msg"></p>
        </div>

        <div>
          <label class="block text-xs font-600 text-brand-muted uppercase tracking-widest mb-2" for="avgPaceMinPerKm">Ø Pace (min/km)</label>
          <input type="number" id="avgPaceMinPerKm" placeholder="z.B. 5.30" step="0.01" min="0.01"
            class="input-field w-full rounded-lg px-4 py-3 text-sm"
            data-error="Bitte eine Pace eingeben." required />
          <p class="hidden mt-1 text-xs text-red-400 error-msg"></p>
        </div>

        <div class="md:col-span-2">
          <button type="submit" id="submit-btn"
            class="btn-primary w-full rounded-lg px-6 py-4 condensed text-lg font-600 text-white tracking-wide uppercase cursor-pointer flex items-center justify-center gap-2">
            <svg id="submit-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            <span id="submit-label">Lauf speichern</span>
          </button>
        </div>

      </form>

      <p id="status" class="mt-4 text-brand-orange text-sm font-500 min-h-[20px]"></p>
    </div>

  </div>

  <script>
    // ---- Validierung ----
    function validateInput(input) {
      const errorEl = input.nextElementSibling;
      if (!input.checkValidity()) {
        input.style.borderColor = '#EF4444';
        errorEl.textContent = input.dataset.error;
        errorEl.classList.remove('hidden');
      } else {
        input.style.borderColor = '#3B82F6';
        errorEl.classList.add('hidden');
      }
    }

    function resetValidation(input) {
      input.style.borderColor = '';
      input.nextElementSibling.classList.add('hidden');
    }

    document.querySelectorAll('#run-form input').forEach(input => {
      input.addEventListener('blur', () => validateInput(input));
    });

    // ---- Statistiken berechnen ----
    function renderStats(runs) {
      const totalKm = runs.reduce((s, r) => s + r.distanceKm, 0);
      const totalMin = runs.reduce((s, r) => s + r.durationMin, 0);
      const bestPace = runs.length ? Math.min(...runs.map(r => r.avgPaceMinPerKm)) : 0;

      document.getElementById('total-km').textContent = totalKm.toFixed(1);

      const hours = Math.floor(totalMin / 60);
      const mins = totalMin % 60;

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-bar rounded-xl p-5 flex flex-col gap-1">
          <span class="text-brand-muted text-xs uppercase tracking-widest font-600">Läufe</span>
          <span class="condensed text-3xl font-700 text-brand-text">${runs.length}</span>
        </div>
        <div class="stat-bar rounded-xl p-5 flex flex-col gap-1">
          <span class="text-brand-muted text-xs uppercase tracking-widest font-600">Trainingszeit</span>
          <span class="condensed text-3xl font-700 text-brand-text">${hours}<span class="text-lg text-brand-muted">h</span> ${mins}<span class="text-lg text-brand-muted">m</span></span>
        </div>
        <div class="stat-bar rounded-xl p-5 flex flex-col gap-1">
          <span class="text-brand-muted text-xs uppercase tracking-widest font-600">Beste Pace</span>
          <span class="condensed text-3xl font-700 text-brand-orange">${bestPace > 0 ? bestPace.toFixed(2) : '—'}<span class="text-lg text-brand-muted"> /km</span></span>
        </div>
      `;
    }

    // ---- Karte rendern ----
    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function erstelleKarte(run, index) {
      const marathon = 42.195;
      const pct = Math.min((run.distanceKm / marathon) * 100, 100).toFixed(1);
      return `
        <div class="run-card rounded-2xl p-6 card-glow cursor-default flex flex-col justify-between"
             style="animation: fadeUp 0.3s ease ${index * 0.06}s both">
          <div>
            <div class="flex items-center justify-between mb-4">
              <span class="text-brand-muted text-xs font-600 uppercase tracking-widest">${formatDate(run.date)}</span>
              <span class="text-brand-muted text-xs">#${run.id}</span>
            </div>
            <p class="condensed text-5xl font-700 text-brand-text leading-none mb-1">${run.distanceKm}<span class="text-2xl text-brand-muted ml-1">km</span></p>

            <!-- Marathon Progress -->
            <div class="mt-3 mb-4">
              <div class="flex justify-between text-xs text-brand-muted mb-1">
                <span>Marathon</span>
                <span>${pct}%</span>
              </div>
              <div class="w-full h-1 bg-brand-border rounded-full overflow-hidden">
                <div class="progress-bar" style="width: ${pct}%"></div>
              </div>
            </div>

            <div class="flex gap-2 flex-wrap">
              <span class="time-badge text-xs px-3 py-1 rounded-full font-500">${run.durationMin} min</span>
              <span class="pace-badge text-xs px-3 py-1 rounded-full font-500">${run.avgPaceMinPerKm} /km</span>
            </div>
          </div>

          <button onclick="loescheRun(${run.id})"
            class="delete-btn mt-5 flex items-center gap-1 text-xs font-500 cursor-pointer w-fit">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            Löschen
          </button>
        </div>
      `;
    }

    // ---- API ----
    async function loescheRun(id) {
      await fetch(`/api/runs/${id}`, { method: 'DELETE' });
      loadRuns();
    }

    async function loadRuns() {
      const res = await fetch('/api/runs');
      const runs = await res.json();

      renderStats(runs);

      document.getElementById('run-count').textContent = `${runs.length} Einträge`;
      document.getElementById('runs-grid').innerHTML = runs.length
        ? runs.map((r, i) => erstelleKarte(r, i)).join('')
        : `<div class="md:col-span-3 text-center py-16 text-brand-muted condensed text-xl tracking-wide uppercase">Noch keine Läufe eingetragen</div>`;
    }

    // ---- Formular ----
    document.getElementById('run-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const inputs = document.querySelectorAll('#run-form input');
      let valid = true;
      inputs.forEach(input => { validateInput(input); if (!input.checkValidity()) valid = false; });
      if (!valid) return;

      const btn = document.getElementById('submit-btn');
      const label = document.getElementById('submit-label');
      btn.disabled = true;
      label.textContent = 'Wird gespeichert…';

      const body = {
        date: document.getElementById('date').value,
        distanceKm: parseFloat(document.getElementById('distanceKm').value),
        durationMin: parseInt(document.getElementById('durationMin').value),
        avgPaceMinPerKm: parseFloat(document.getElementById('avgPaceMinPerKm').value),
      };

      const res = await fetch('/api/runs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      btn.disabled = false;
      label.textContent = 'Lauf speichern';

      if (res.ok) {
        const newRun = await res.json();
        const status = document.getElementById('status');
        status.textContent = `Lauf #${newRun.id} gespeichert!`;
        setTimeout(() => { status.textContent = ''; }, 3000);
        document.getElementById('run-form').reset();
        inputs.forEach(input => resetValidation(input));
        loadRuns();
      }
    });

    loadRuns();
  </script>
</body>
</html>
